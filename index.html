<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D Змейка со стрелкой</title>

<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('Service Worker Registered'))
      .catch((err) => console.log('Service Worker Failed', err));
  }
</script>

<style>
body {
    margin: 0;
    background: #e4b77d; 
    color: #3e2723;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
    transition: background 0.5s;
}
h1 { 
    margin: 15px 0 5px; 
    font-size: 20px; 
    text-shadow: 1px 1px 2px rgba(255,255,255,0.6); 
    text-align: center;
}
#score { 
    font-size: 18px; 
    margin-bottom: 10px; 
    font-weight: bold; 
    text-align: center;
}
#canvas-container {
    width: 400px;
    height: 400px;
    max-width: 95vw;
    max-height: 95vw;
    border: 4px solid #b58248;
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    border-radius: 8px;
    transition: border-color 0.5s;
}
#menu-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(62, 39, 35, 0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    z-index: 10;
    color: #fff;
    padding: 20px;
    box-sizing: border-box;
}
.menu-group {
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    width: 80%;
}
.menu-group label {
    font-size: 14px;
    margin-bottom: 5px;
    color: #e4b77d;
}
.menu-group select, .menu-group input {
    padding: 8px;
    border-radius: 4px;
    border: none;
    font-size: 16px;
}
#start-btn {
    background: #27ae60;
    color: white;
    border: none;
    padding: 12px 30px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.2s;
    touch-action: manipulation;
}
#start-btn:hover {
    background: #219653;
}
#joystick {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: rgba(93, 64, 55, 0.4);
    border: 2px solid #5d4037;
    position: relative;
    margin-top: 15px;
    touch-action: none;
}
#stick {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #5d4037;
    position: absolute;
    left: 40px;
    top: 40px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<h1>🌵 Сытая и Тяжёлая Змейка 🍏 Вес = Замедление</h1>
<div id="score">Счёт: 0</div>

<div id="canvas-container">
    <div id="menu-overlay">
        <h2>⚙️ Настройки игры</h2>
        
        <div class="menu-group">
            <label for="location-select">Выбор локации:</label>
            <select id="location-select">
                <option value="desert">🌵 Пустыня</option>
                <option value="meadow">🌿 Зелёная поляна</option>
            </select>
        </div>

        <div class="menu-group">
            <label for="color-select">Цвет змейки:</label>
            <select id="color-select">
                <option value="0x27ae60">Зелёный</option>
                <option value="0xf1c40f">Жёлтый</option>
                <option value="0x2980b9">Синий</option>
                <option value="0xc0392b">Красный</option>
                <option value="0xe67e22">Оранжевый</option>
                <option value="0x8e44ad">Фиолетовый</option>
            </select>
        </div>

        <div class="menu-group">
            <label for="win-score-input">Очков для победы (0 — без лимита):</label>
            <input type="number" id="win-score-input" value="15" min="0" max="999">
        </div>
        <button id="start-btn">Играть!</button>
    </div>
</div>

<div id="joystick">
    <div id="stick"></div>
</div>

<script>
const container = document.getElementById("canvas-container");
const scoreEl = document.getElementById("score");
const menuOverlay = document.getElementById("menu-overlay");
const startBtn = document.getElementById("start-btn");
const colorSelect = document.getElementById("color-select");
const winScoreInput = document.getElementById("win-score-input");
const locationSelect = document.getElementById("location-select");

const worldSize = 20; 
let isGameRunning = false; 

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(0, 0, 24); 
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(container.clientWidth || 400, container.clientHeight || 400);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
container.appendChild(renderer.domElement);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.75); 
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2); 
dirLight.position.set(8, 12, 20); 
scene.add(dirLight);

const groundGeometry = new THREE.PlaneGeometry(worldSize, worldSize);
const groundMaterial = new THREE.MeshStandardMaterial({ roughness: 0.9 });
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.position.z = -0.45; 
scene.add(ground);

const borderGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(worldSize, worldSize));
const borderMat = new THREE.LineBasicMaterial();
const wireframe = new THREE.LineSegments(borderGeo, borderMat);
wireframe.position.z = -0.43;
scene.add(wireframe);

const environments = {
    desert: {
        bgBody: "#e4b77d",
        borderCSS: "#b58248",
        sceneBg: 0xdfb074,
        groundColor: 0xd29954,
        borderColor: 0xb58248,
        ambientColor: 0xfff0db,
        dirColor: 0xfffaed
    },
    meadow: {
        bgBody: "#a8e6cf",
        borderCSS: "#56ab2f",
        sceneBg: 0x81c784,
        groundColor: 0x4caf50,
        borderColor: 0x2e7d32,
        ambientColor: 0xe8f5e9,
        dirColor: 0xffffff
    }
};

let snakeSegments = []; 
let snakeHistory = [];  
let score = 0;
let winScore = 15; 

const baseSpeed = 0.12; 
let speed = baseSpeed;       
let speedBoostTimer = 0;     
let diamondTimer = 0; 
const segmentSpacing = 4; 

let targetAngle = 0;
let currentAngle = 0;

let foodPosition = new THREE.Vector3();
let foodMesh;
let foodType = "normal"; 

let npcs = [];
const numNpcs = 1; 
const baseNpcSpeed = 0.14; 
let npcRespawnTimer = 0; 

let playerMaterial = new THREE.MeshStandardMaterial({ color: 0x27ae60, roughness: 0.3 }); 
const npcMaterial = new THREE.MeshStandardMaterial({ color: 0xd63031, roughness: 0.3 }); 

// Материал для стрелки игрока (по умолчанию белый матовый, чтобы хорошо выделяться)
let arrowMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });

const shieldMaterial = new THREE.MeshStandardMaterial({ 
    color: 0xf1c40f, 
    emissive: 0xd35400, 
    roughness: 0.1, 
    metalness: 0.5,
    transparent: true, 
    opacity: 0.85 
});

const headGeometry = new THREE.SphereGeometry(0.52, 32, 32);
const bodyGeometry = new THREE.SphereGeometry(0.48, 32, 32); 

const eyeGeometry = new THREE.SphereGeometry(0.12, 16, 16);
const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
const npcEyeMaterial = new THREE.MeshStandardMaterial({ color: 0xf1c40f }); 
const pupilGeometry = new THREE.SphereGeometry(0.06, 16, 16);
const pupilMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });

// Переменная для хранения ссылки на стрелку игрока
let playerArrowMesh = null;

function updateEnvironment(envKey) {
    const env = environments[envKey];
    document.body.style.background = env.bgBody;
    container.style.borderColor = env.borderCSS;
    scene.background = new THREE.Color(env.sceneBg);
    groundMaterial.color.setHex(env.groundColor);
    borderMat.color.setHex(env.borderColor);
    ambientLight.color.setHex(env.ambientColor);
    dirLight.color.setHex(env.dirColor);
}

function createRealisticApple(type = "normal") {
    const appleGroup = new THREE.Group();
    const appleGeo = new THREE.SphereGeometry(0.38, 32, 32);
    
    let appleMat;
    if (type === "diamond") {
        appleMat = new THREE.MeshStandardMaterial({ color: 0x00d2d3, roughness: 0.05, metalness: 0.9, transparent: true, opacity: 0.85 });
    } else if (type === "gold") {
        appleMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f, roughness: 0.1, metalness: 0.8 });
    } else {
        appleMat = new THREE.MeshStandardMaterial({ color: 0xcc2424, roughness: 0.15 });
    }
        
    const apple = new THREE.Mesh(appleGeo, appleMat);
    apple.scale.set(1, 1, 0.88); 
    appleGroup.add(apple);

    const stemGeo = new THREE.CylinderGeometry(0.02, 0.015, 0.22, 12);
    const stemMat = new THREE.MeshStandardMaterial({ color: type === "gold" ? 0x964b00 : (type === "diamond" ? 0x54a0ff : 0x5c4033) });
    const stem = new THREE.Mesh(stemGeo, stemMat);
    stem.position.set(0, 0.12, 0.28);
    stem.rotation.set(Math.PI / 3, 0, -Math.PI / 6);
    appleGroup.add(stem);

    const leafGeo = new THREE.SphereGeometry(0.07, 16, 16);
    const leafMat = new THREE.MeshStandardMaterial({ color: type === "gold" ? 0x27ae60 : (type === "diamond" ? 0x01cbc6 : 0x2ecc71) });
    const leaf = new THREE.Mesh(leafGeo, leafMat);
    leaf.scale.set(2, 0.6, 0.2); 
    leaf.position.set(0.12, 0.2, 0.32);
    leaf.rotation.set(Math.PI / 4, 0, -Math.PI / 4);
    appleGroup.add(leaf);

    return appleGroup;
}

function spawnFood() {
    if (foodMesh) scene.remove(foodMesh);
    const range = worldSize / 2 - 1;
    foodPosition.set((Math.random() - 0.5) * range * 2, (Math.random() - 0.5) * range * 2, 0.05);
    
    const rand = Math.random();
    if (rand < 0.15) {          // 15% Шанс на Алмазное
        foodType = "diamond"; 
    } else if (rand < 0.45) {   // 30% Шанс на Золотое (0.15 + 0.30)
        foodType = "gold";    
    } else {                    // 55% Шанс на Обычное
        foodType = "normal";  
    }
    
    foodMesh = createRealisticApple(foodType);
    foodMesh.position.copy(foodPosition);
    scene.add(foodMesh);
}

// Функция создания 3D-стрелки-указателя
function createPointerArrow(mat) {
    const arrowGroup = new THREE.Group();
    
    // Основание (палочка) стрелки
    const cylinderGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.4, 16);
    const cylinder = new THREE.Mesh(cylinderGeo, mat);
    cylinder.position.y = 0.2; // Сдвиг, чтобы основание начиналось от центра группы
    arrowGroup.add(cylinder);
    
    // Наконечник (конус) стрелки
    const coneGeo = new THREE.ConeGeometry(0.15, 0.3, 16);
    const cone = new THREE.Mesh(coneGeo, mat);
    cone.position.y = 0.55; // Ставим конус на верхушку палочки
    arrowGroup.add(cone);
    
    // Разворачиваем стрелку так, чтобы «верх» (ось Y) смотрел вперед по ходу движения змейки (ось X в локальных координатах головы)
    arrowGroup.rotation.z = -Math.PI / 2;
    // Приподнимаем над головой змейки по оси Z, чтобы она парила сверху
    arrowGroup.position.z = 0.9;
    
    return arrowGroup;
}

function createVisualSegment(index, isHead, isNpc) {
    let mesh;
    const mat = isNpc ? npcMaterial : playerMaterial; 
    
    if (isHead) {
        mesh = new THREE.Mesh(headGeometry, mat);
        const e1 = new THREE.Mesh(eyeGeometry, isNpc ? npcEyeMaterial : eyeMaterial);
        const e2 = new THREE.Mesh(eyeGeometry, isNpc ? npcEyeMaterial : eyeMaterial);
        const p1 = new THREE.Mesh(pupilGeometry, pupilMaterial);
        const p2 = new THREE.Mesh(pupilGeometry, pupilMaterial);
        e1.position.set(0.24, 0.18, 0.22); e2.position.set(0.24, -0.18, 0.22);
        p1.position.set(0.32, 0.18, 0.28); p2.position.set(0.32, -0.18, 0.28);
        mesh.add(e1, e2, p1, p2);
        
        // Если это голова игрока, добавляем в нее стрелку
        if (!isNpc) {
            playerArrowMesh = createPointerArrow(arrowMaterial);
            mesh.add(playerArrowMesh);
        }
    } else {
        mesh = new THREE.Mesh(bodyGeometry, mat);
        const scale = Math.max(0.6, 1 - (index / 40)); 
        mesh.scale.set(scale, scale, scale);
    }
    scene.add(mesh);
    return mesh;
}

function createNpc() {
    let npc = { segments: [], history: [], angle: Math.random() * Math.PI * 2 };
    const startX = (Math.random() - 0.5) * (worldSize - 4);
    const startY = (Math.random() - 0.5) * (worldSize - 4);

    for (let i = 0; i < 5; i++) {
        const seg = createVisualSegment(i, i === 0, true);
        seg.position.set(startX - (i * baseNpcSpeed), startY, 0);
        npc.segments.push(seg);
    }
    for (let i = 0; i < 100; i++) {
        npc.history.push(new THREE.Vector3(startX - (i * baseNpcSpeed), startY, 0));
    }
    return npc;
}

function removeNpc(npc) {
    npc.segments.forEach(seg => scene.remove(seg));
}

function resetGame() {
    isGameRunning = false;
    menuOverlay.style.display = "flex"; 
    
    score = 0;
    targetAngle = 0; currentAngle = 0;
    speed = baseSpeed;
    speedBoostTimer = 0;
    diamondTimer = 0;
    npcRespawnTimer = 0;

    snakeSegments.forEach(seg => scene.remove(seg));
    snakeSegments = []; snakeHistory = [];
    playerArrowMesh = null; // Сбрасываем ссылку на стрелку

    npcs.forEach(npc => removeNpc(npc));
    npcs = [];

    updateEnvironment(locationSelect.value);
}

locationSelect.addEventListener("change", (e) => {
    updateEnvironment(e.target.value);
});

function startGame() {
    if (isGameRunning) return; 
    updateEnvironment(locationSelect.value);
    const selectedColor = parseInt(colorSelect.value);
    playerMaterial.color.setHex(selectedColor);
    winScore = parseInt(winScoreInput.value) || 0;
    menuOverlay.style.display = "none"; 

    for (let i = 0; i < 4; i++) {
        const seg = createVisualSegment(i, i === 0, false);
        seg.position.set(0, 0, 0);
        snakeSegments.push(seg);
    }
    for (let i = 0; i < 150; i++) {
        snakeHistory.push(new THREE.Vector3(0 - (i * speed), 0, 0));
    }
    for (let i = 0; i < numNpcs; i++) {
        npcs.push(createNpc());
    }
    spawnFood();
    isGameRunning = true;
}

startBtn.addEventListener("click", startGame);
startBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    startGame();
});

function lerpAngle(a, b, t) {
    let cs = (1 - t) * Math.cos(a) + t * Math.cos(b);
    let sn = (1 - t) * Math.sin(a) + t * Math.sin(b);
    return Math.atan2(sn, cs);
}

function updateGameLogic() {
    if (!isGameRunning || snakeSegments.length === 0) return;

    if (winScore > 0 && score >= winScore) {
        alert(`🏆 ПОБЕДА! Вы набрали необходимые ${winScore} очков!`);
        resetGame();
        return;
    }

    let weightSlowdown = (snakeSegments.length - 4) * 0.003;
    let currentBaseSpeed = Math.max(0.05, baseSpeed - weightSlowdown);

    let scoreText = `Счёт: ${score}${winScore > 0 ? " / " + winScore : ""}`;
    let hasShield = false;
    const currentTime = Date.now();

    // Проверка независимых от лагов таймеров времени
    if (diamondTimer > currentTime) {
        hasShield = true;
        speed = baseSpeed * 1.3; 
        const secLeft = Math.ceil((diamondTimer - currentTime) / 1000);
        scoreText += ` <span style="color:#f1c40f;">🛡️ ЭНЕРГОЩИТ (${secLeft}с)</span>`;
        let wave = Math.sin(currentTime * 0.005) * 0.2 + 0.8; 
        shieldMaterial.color.setRGB(1, 0.7 + wave * 0.25, 0.1); 
        shieldMaterial.emissive.setRGB(0.8, 0.3 * wave, 0);
    } else if (speedBoostTimer > currentTime) {
        speed = baseSpeed * 1.6; 
        const secLeft = Math.ceil((speedBoostTimer - currentTime) / 1000);
        scoreText += ` <span style="color:#e67e22;">⚡ ТУРБО! (${secLeft}с)</span>`;
    } else {
        speed = currentBaseSpeed; 
    }

    // Обновляем материалы сегментов и стрелки в зависимости от щита
    snakeSegments.forEach(seg => {
        seg.material = hasShield ? shieldMaterial : playerMaterial;
    });
    
    if (playerArrowMesh) {
        // Каждым вложенным элементам стрелки задаем тот же материал, что и телу
        playerArrowMesh.children.forEach(child => {
            child.material = hasShield ? shieldMaterial : arrowMaterial;
        });
    }
    
    if (npcRespawnTimer > 0) {
        npcRespawnTimer--;
        const secondsLeft = Math.ceil(npcRespawnTimer / 60);
        scoreText += ` | 🔴 Воришка через: ${secondsLeft}с`;
        if (npcRespawnTimer === 0 && npcs.length === 0) {
            npcs.push(createNpc()); 
        }
    }
    scoreEl.innerHTML = scoreText;

    currentAngle = lerpAngle(currentAngle, targetAngle, 0.15);
    const head = snakeSegments[0];
    head.position.x += Math.cos(currentAngle) * speed;
    head.position.y += Math.sin(currentAngle) * speed;
    head.rotation.z = currentAngle;

    // Покачивание стрелки вверх-вниз для живого эффекта
    if (playerArrowMesh) {
        playerArrowMesh.position.z = 0.9 + Math.sin(currentTime * 0.007) * 0.08;
    }

    const halfWorld = worldSize / 2;
    if (head.position.x > halfWorld) head.position.x = -halfWorld;
    if (head.position.x < -halfWorld) head.position.x = halfWorld;
    if (head.position.y > halfWorld) head.position.y = -halfWorld;
    if (head.position.y < -halfWorld) head.position.y = halfWorld;

    snakeHistory.unshift(head.position.clone());
    if (snakeHistory.length > snakeSegments.length * segmentSpacing + 20) snakeHistory.pop();

    for (let i = 1; i < snakeSegments.length; i++) {
        const idx = i * segmentSpacing;
        if (snakeHistory[idx]) snakeSegments[i].position.copy(snakeHistory[idx]);
    }

    if (head.position.distanceTo(foodPosition) < 0.75) {
        const now = Date.now();
        if (foodType === "diamond") {
            score += 3;
            diamondTimer = now + 15000;    // Щит на 15 секунд
            speedBoostTimer = 0; 
        } else if (foodType === "gold") {
            score += 2;          
            speedBoostTimer = now + 10000; // Турбо на 10 секунд
            diamondTimer = 0;
        } else {
            score += 1;
        }
        const nextIdx = snakeSegments.length;
        const newSeg = createVisualSegment(nextIdx, false, false);
        newSeg.position.copy(snakeSegments[nextIdx - 1].position);
        snakeSegments.push(newSeg);
        spawnFood();
    }

    for (let i = 6; i < snakeSegments.length; i++) {
        if (head.position.distanceTo(snakeSegments[i].position) < 0.4) {
            alert("Игра окончена! Ты врезался в себя. Твой счёт: " + score);
            resetGame();
            return;
        }
    }

    for (let n = npcs.length - 1; n >= 0; n--) {
        const npc = npcs[n];
        const npcHead = npc.segments[0];
        let npcWeightSlowdown = (npc.segments.length - 5) * 0.004;
        let currentNpcSpeed = Math.max(0.05, baseNpcSpeed - npcWeightSlowdown);

        if (!hasShield) {
            for (let i = 0; i < npc.segments.length; i++) {
                if (head.position.distanceTo(npc.segments[i].position) < 0.45) {
                    alert("Ты врезался в красного воришку! Игра окончена. Счёт: " + score);
                    resetGame();
                    return;
                }
            }
        }

        let npcCrushed = false;
        for (let i = 0; i < snakeSegments.length; i++) {
            if (npcHead.position.distanceTo(snakeSegments[i].position) < 0.45) {
                removeNpc(npc);
                npcs.splice(n, 1);
                npcRespawnTimer = 1200; 
                npcCrushed = true;
                break;
            }
        }

        if (npcCrushed) continue; 

        const diffX = foodPosition.x - npcHead.position.x;
        const diffY = foodPosition.y - npcHead.position.y;
        const desiredAngle = Math.atan2(diffY, diffX);
        npc.angle = lerpAngle(npc.angle, desiredAngle, 0.08);

        npcHead.position.x += Math.cos(npc.angle) * currentNpcSpeed;
        npcHead.position.y += Math.sin(npc.angle) * currentNpcSpeed;
        npcHead.rotation.z = npc.angle;

        if (npcHead.position.x > halfWorld) npcHead.position.x = -halfWorld;
        if (npcHead.position.x < -halfWorld) npcHead.position.x = halfWorld;
        if (npcHead.position.y > halfWorld) npcHead.position.y = -halfWorld;
        if (npcHead.position.y < -halfWorld) npcHead.position.y = halfWorld;

        npc.history.unshift(npcHead.position.clone());
        if (npc.history.length > npc.segments.length * segmentSpacing + 20) npc.history.pop();

        for (let i = 1; i < npc.segments.length; i++) {
            const idx = i * segmentSpacing;
            if (npc.history[idx]) npc.segments[i].position.copy(npc.history[idx]);
        }

        if (npcHead.position.distanceTo(foodPosition) < 0.65) {
            const nextIdx = npc.segments.length;
            const newSeg = createVisualSegment(nextIdx, false, true);
            newSeg.position.copy(npc.segments[nextIdx - 1].position);
            npc.segments.push(newSeg);
            spawnFood();
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    updateGameLogic();
    if (foodMesh) {
        foodMesh.position.z = 0.05 + Math.sin(Date.now() * 0.004) * 0.08; 
        foodMesh.rotation.z += 0.015; 
        if (foodType === "gold" || foodType === "diamond") {
            foodMesh.rotation.x = Math.sin(Date.now() * 0.002) * 0.2;
        }
    }
    renderer.render(scene, camera);
}
animate();

document.addEventListener("keydown", e => {
    if (!isGameRunning) return;
    if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") targetAngle = 0;
    if (e.key === "ArrowUp"    || e.key.toLowerCase() === "w") targetAngle = Math.PI / 2;
    if (e.key === "ArrowLeft"  || e.key.toLowerCase() === "a") targetAngle = Math.PI;
    if (e.key === "ArrowDown"  || e.key.toLowerCase() === "s") targetAngle = -Math.PI / 2;
});

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");
const center = 65; const maxDistance = 35;
let active = false;

function moveStick(clientX, clientY) {
    if (!isGameRunning) return;
    const rect = joystick.getBoundingClientRect();
    let x = clientX - rect.left - center;
    let y = clientY - rect.top - center;
    const distance = Math.sqrt(x*x + y*y);

    if (distance > maxDistance) {
        x = x / distance * maxDistance; y = y / distance * maxDistance;
    }
    stick.style.left = (center - 25 + x) + "px";
    stick.style.top  = (center - 25 + y) + "px";

    if (distance > 5) { targetAngle = Math.atan2(-y, x); }
}

joystick.addEventListener("touchstart", e => { active = true; moveStick(e.touches[0].clientX, e.touches[0].clientY); });
joystick.addEventListener("touchmove", e => { if(!active) return; e.preventDefault(); moveStick(e.touches[0].clientX, e.touches[0].clientY); });
joystick.addEventListener("touchend", () => { active = false; stick.style.left = "40px"; stick.style.top = "40px"; });
joystick.addEventListener("touchcancel", () => { active = false; stick.style.left = "40px"; stick.style.top = "40px"; });

function resize() {
    const width = Math.min(400, window.innerWidth * 0.95);
    renderer.setSize(width, width);
    camera.aspect = 1; 
    camera.updateProjectionMatrix();
    container.style.width = width + "px"; container.style.height = width + "px";
}
window.addEventListener('resize', resize);
resize();

resetGame();
</script>
</body>
